<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gewichtstracker</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gewicht">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1><span class="icon">⚖️</span> Gewichtstracker</h1>
    </div>
    <div class="hero-weight">
      <div class="hero-label">Aktuelles Gewicht</div>
      <div class="hero-value empty" id="hero-value">— kg</div>
      <div class="hero-week" id="hero-week" hidden></div>
    </div>
  </header>

  <main>
    <section class="card" id="entry-section">
      <div class="card-title">Eintrag</div>
      <form id="entry-form">
        <div class="form-row">
          <label for="date-input">Datum</label>
          <input type="date" id="date-input" required>
        </div>
        <div class="form-row">
          <label for="weight-input">Gewicht (kg)</label>
          <input type="text" id="weight-input" placeholder="0.0" inputmode="decimal" pattern="[0-9.,]*" autocomplete="off" required>
        </div>
        <button type="submit" class="btn-primary">Speichern</button>
      </form>
    </section>

    <section class="card" id="chart-section">
      <div class="card-title">Wochendurchschnitt</div>
      <div id="chart-empty" class="empty-state" hidden>
        <span class="empty-icon">📈</span>
        Noch keine abgeschlossenen Wochen —<br>trage täglich dein Gewicht ein.
      </div>
      <div id="chart-wrap">
        <canvas id="weight-chart"></canvas>
      </div>
    </section>

    <section class="card" id="history-section">
      <div class="card-title">Letzte Einträge</div>
      <div id="history-empty" class="empty-state">
        <span class="empty-icon">📝</span>
        Noch keine Einträge —<br>füge deinen ersten Eintrag oben hinzu.
      </div>
      <ul id="history-list" hidden></ul>
    </section>
  </main>

  <div id="toast" role="alert" aria-live="polite"></div>

  <script src="chart.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
